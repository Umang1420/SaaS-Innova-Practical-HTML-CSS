<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Management System </title>
    
    <style>
        .content{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        form{
            width: 100%;
            max-width: 600px;
            height: 500px;
            border-radius: 20px;
            background-color: antiquewhite;
            margin: 10px;
        }
        #add{
            height: 300px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            
        }
        #addbtn{
            width: 95%;
            height: 30px;
            border: 2px transparent;
            border-radius: 5px;
            margin: 10px;
        }
        
        input{
            width: 95%;
            border-radius: px;
            height: 30px;
            margin: 10px;
            text-align: center;
            border: 2px transparent;
            border-radius: 5px;
        }
        #form1{
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }
        table,th,td{
            width: 500px;
            border: 2px solid black; 
            text-align: center;
        }
        .dis {
            width: 100%;
        }

    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="content">    
                <div id="page1" >
                    <form id="form1" onclick="event.preventDefault();">
                        <h2 style="text-align: center; display: block;"> Recipe List</h2>
                       <div class="records">
                            <table>
                                <tr>
                                    <th>Recpie Name</th>
                                    <th>Recpie Ingrediants</th>
                                    <th>Recpie Time</th>
                                    <th>category</th>
                                    <th>Modification</th>
                                </tr>
                                
                                  <tbody id="recipeRows"></tbody>
                                
                            </table>
                        </div>
                        <div class="dis">
                            <input type="text" id="searchBox" placeholder="Search by ingredient" required>
                            <button id="addbtn" onclick="searchRecipes(), event.preventDefault();">Search</button>
                            <button id="addbtn" onclick="show(), event.preventDefault();">Show All</button> 
                            <button id="addbtn" onclick="return showe('page2','page1');">Add Recepies</button>
                        </div>
                    </form>
                </div>
                <div id="page2" style="display: none;">
                    <form onclick="event.preventDefault();">
                        
                        <div id="add">
                            <h2 style="text-align: center;"> Recipe Management System</h2>
                            <input type="text" id="addre" name="recipe" required placeholder="Enter Recipe Name">
                            <input type="text" id="addin" name="recipe" required placeholder="Enter Recipe Ingredeants">
                            <input type="text" id="addti" name="recipe" required placeholder="Enter Recipe time">
                            <input type="text" id="addca" name="recipe" required placeholder="Enter Cataogary">
                            
                        </div>
                        <div class="nav-links">
                            <button id="addbtn" type="addbtn" onclick="addf()">Add</button>
                            <button id="addbtn" onclick="return showe('page1','page2');">See All Recpies</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </header>
    <script src="script.js" defer></script>
</body>
</html>
