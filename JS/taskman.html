<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <style>
        .container{
            width: 100%;
            margin: 0 auto;
            padding: 0 15px;
        }
        .content{
            width: 100%;
            max-width: 100%;
            height: fit-content;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 100px;
            
        }
        .tasks{
            width: 100%;
            max-width: 600px;
            height: fit-content;
            background-color: bisque;
            border-radius: 80px;
        }
        .input{
            padding: 20px;
            height: fit-content;
        }
        .input input{
            width: 100%;
            max-width: 550px;
            height: 30px;
            border: none;
            border-radius: 10px;
        }
        #buttons{
            margin: 10px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .buttons #btn{
            width: 100%;
            max-width: 45%;
            margin: 10px;
            border: none;
            border-radius: 10px;
            padding: 15px;
        }
        
       .task-disp{
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 510px;
            margin-left: 45px;
       }
       #task-item{
            width: 100%;
            max-width: 510px;
            margin-left: 45px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
       }
       .task-item div{
        width: 20%;
       }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="tasks">
                <form onsubmit="event.preventDefault();">
                    <h1 style="text-align: center;">Task Manager</h1>
                    <div class="input">
                        <label>Enter Task Title:</label><br><br>

                        <input id="ts" type="text" required><br><br>
                        <label>Enter Task Description:</label><br><br>
                        <input id="td" style="height: 80px;" type="text" required>
                        <div class="buttons">
                            <button id="btn" type="button" onclick="add();">Add</button>
                            <button id="btn" type="button" onclick="display();event.preventDefault();">Display All</button>
                            <button id="btn" type="button" onclick="filter()">Completed</button>
                            <button id="btn" type="button" onclick="filter()">Incomplete</button>
                        </div>
                    </div>
                    <div class="task-disp">
                        <h3>Task Title</h3>
                        <h3>Task Description</h3>
                        <h3>Task Stetus</h3>
                        <h3>Modification</h3>
                    </div>  
                    <div id="display">
                    
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
<script defer>
let taskList = [];
let currentFilter = "all"; 

function add() {
    let inputtask = document.getElementById("ts");
    let inputds = document.getElementById("td");
    let task = inputtask.value.trim();
    let taskd = inputds.value.trim();
    
    if (task !== "" && taskd !== "") {
        taskList.push({ task: task, taskDescription: taskd, Completed: false });
        inputtask.value = "";
        inputds.value = "";
        renderList();
    }
}

function display() {
    currentFilter = "all";
    renderList();
}

function filter() {
    
    let buttonText = event.target.innerText.toLowerCase();
    if (buttonText === "completed") {
        currentFilter = "completed";
    } else if (buttonText === "incomplete") {
        currentFilter = "incomplete";
    }
    renderList();
}


function renderList() {
    let list = "";
    
    for (let i = 0; i < taskList.length; i++) {
        
        if (currentFilter === "completed" && !taskList[i].Completed) continue;
        if (currentFilter === "incomplete" && taskList[i].Completed) continue;

        list += `<div id='task-item'>
                    <div><p class='task-title'>${taskList[i].task}</p></div>
                    <div><p class='task-desc'>${taskList[i].taskDescription}</p></div>
                    <div>
                        <label>Completed</label>
                        <input onclick='check(${i}, this)' ${taskList[i].Completed ? 'checked' : ''} type="checkbox">
                    </div>
                    <div>
                        <button type='button' onclick='edit(${i})'>Edit</button>
                        <button type='button' onclick='del(${i})'>Delete</button>
                    </div>
                </div>`;
    }
    
    document.getElementById("display").innerHTML = list;
}

function check(index, checkbox) {
    taskList[index].Completed = checkbox.checked;
    renderList(); 
}

function edit(index) {
    let currentTask = taskList[index];
    let newTitle = prompt("Edit Task Title:", currentTask.task);
    let newDesc = prompt("Edit Task Description:", currentTask.taskDescription);
    
    if (newTitle !== null && newDesc !== null) {
        taskList[index].task = newTitle.trim() || currentTask.task;
        taskList[index].taskDescription = newDesc.trim() || currentTask.taskDescription;
        renderList();
    }
}

function del(index) {
    taskList.splice(index, 1);
    renderList();
}


</script>
</html>
