<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="box">
                <div class="opration">
                    <h1>Calculator</h1><br>
                    <div class="input">
                        <input type="text" id="in1" placeholder=" Enter First Number">
                        <input type="text" id="in2" placeholder=" Enter Secound Number">
                    </div><br>
                    <div class="buttons">
                        <button id="add">ADDITION(+)</button>
                        <button id="sub">SUBTRACTION(-)</button>
                        <button id="mul">MULTIPLICATION(*)</button>
                        <button id="di">DIVISION(/)</button>
                    </div><br>
                    <div class="result">
                        <h2>Result:</h2><br>
                        <div id="resultbox">
                            <p id="result">Result will be Shown here</p>
                        </div>
                        <div class="clrbtn">
                            <button id="clr">Clear</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="script.js" defer></script>
</html>
