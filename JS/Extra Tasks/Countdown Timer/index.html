<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="content">
            <div id="box">
                <div class="display">
                    <h1 id="ti">Timer</h1>
                </div>
                <div class="input">
                        <input id="in" type="number ">
                    <select id="timetype">
                        <option value="">Select type</option>
                        <option value="sec">Secounds</option>
                        <option value="min">Minietes</option>
                        <option value="hour">Hours</option>
                    </select>
                </div>
                <div class="btn">
                    <button id="st">Start Countdown</button>
                    <button id="rt" onclick="location.reload()">Restart</button>
                </div>
            </div> 
        </div>
    </div>
</body>
<script src="script.js" defer></script>
</html>
