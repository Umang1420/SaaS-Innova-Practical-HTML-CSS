<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi API</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="content">
            <header>
                <nav class="nav">
                    <h1>Multiple Api</h1>
                    <div class="nav-links">
                        <button id="user" value="OFF">Users</button>
                        <button id="post" value="OFF">Posts</button>
                    </div>
                </nav>
            </header>
                <div class="quates">
                    <div class="card">
                        <h3 style="text-align: center;">Quote of the day</h3><br><br>
                        <div class="data">
                            <i style="font-size: 1.2rem;" id="qu">"Thinking is the capital, Enterprise is the way, Hard Work is the solution."<br><br>~ Abdul Kalam</i>
                        </div>
                    </div>
                </div>
                <div class="cards">
                    <div class="card1" id="c1">
                        <h3 style=" text-align:center;width: 100%; margin-bottom: 5px;">User Table</h3>
                        <table>
                            <tr>
                                <th>Name</th>
                                <th>Username</th>
                                <th>Email</th>
                                <th>Phone</th>
                            </tr>
                            <tbody  id="data"></tbody>
                        </table>
                    </div>
                    <div class="card2" id="c2">
                        <h3 style=" text-align:center; width: 100%; margin-bottom: 5px;">Posts</h3><br><br>
                        <div id="data1">

                        </div>
                    </div>
                </div>
        </div>
    </div>
</body>
<script src="script.js" defer></script>
</html>
