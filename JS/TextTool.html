<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Analysis Tool</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        margin: 20px;
      }
      .container {
        width: 100%;
        max-width: 100%;
        margin: 0 auto;
        padding: 0 15px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .content {
        width: 100%;
        max-width: 900px;
        background-color: rgb(224, 229, 231);
        height: fit-content;
        display: flex;
        justify-content: center;
        align-items: center;
        border: none;
        border-radius: 100px;
      }
      .input {
        width: 100%;
        max-width: 800px;
        height: fit-content;
        margin: 20px;
      }
      .in {
        width: 100%;
        max-width: 740px;
        height: 100px;
        border: none;
        background-color: lightcyan;
        border-radius: 10px;
      }
      .buttons {
        display: flex;
      }
      .an {
        padding: 10px;
        border-radius: 5px;
        border: none;
        width: 100%;
        background-color: lightcyan;
      }
      .cards {
        width: 100%;
        max-width: 700px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
      }
      .card {
        width: 100%;
        max-width: 180px;
        height: 100px;
        background-color: lightcyan;
        border: none;
        border-radius: 10px;
      }
      .freq {
        min-height: 100px;
        height: fit-content;
        background-color: lightcyan;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 50px;
      }
      .co {
        width: 100%;
      }
      #lists .word-row {
        min-height: 50px;
        height: fit-content;
        border: none;
        border-radius: 10px;
        width: 100%;
        max-width: 600px;
        background-color: antiquewhite;
        padding: 5px;
        margin-top: 5px;
        display: flex;
        justify-content: space-between;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="content">
        <div class="input">
          <h1 style="text-align: center">Text Anylise Tool</h1>
          <h2>Enter Your Text</h2>
          <br />
          <form>
            <input type="text" class="in" id="input" required />
            <div class="buttons">
              <button
                class="an"
                id="an"
                onclick="
                  getstring();
                  event.preventDefault();
                  wcount();
                "
              >
                Get Anaylsis
              </button>
              <button
                class="an"
                id="cl"
                onclick="
                  feclear();
                  event.preventDefault();
                "
              >
                Clear
              </button>
            </div>
          </form>
          <div class="result">
            <div class="cards">
              <div class="card">
                <div class="card-info">
                  <h6>Count:</h6>
                  <p id="count"></p>
                </div>
              </div>
              <div class="card">
                <div class="card-info">
                  <h6>Words:</h6>
                  <p id="word"></p>
                </div>
              </div>
            </div>
            <div class="freq">
              <div class="co">
                <h4>Frequancy of words:</h4>
                <div id="lists"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script defer>
    function feclear() {
      let input = document.getElementById("input");
      document.getElementById("word").innerHTML = "0";
      document.getElementById("count").innerHTML = "0";
      document.getElementById("p").innerHTML = "";
      input.value = " ";
    }
    function getstring() {
      let input = document.getElementById("input").value;
      if (input.length < 300) {
        document.getElementById("count").innerHTML = input.trim().length;
        if (input == "") {
          document.getElementById("word").innerHTML = "0";
        } else {
          document.getElementById("word").innerHTML = input
            .trim()
            .split(" ").length;
        }
      } else {
        alert("Text is too long, reduce it.");
      }
    }

    function wcount() {
      let input = document.getElementById("input").value;

      if (input.length < 300) {
        let words = input.trim().toLowerCase().split(" ");
        let frequency = {};

        for (let i = 0; i < words.length; i++) {
          let currentWord = words[i];
          if (frequency[currentWord]) {
            frequency[currentWord] = frequency[currentWord] + 1;
          } else {
            frequency[currentWord] = 1;
          }
        }

        let list = "";
        let wordKeys = Object.keys(frequency);

            for (let i = 0; i < wordKeys.length; i++) {
                let key = wordKeys[i];
                list += "<div class='word-row'><span>" + key + "</span><span>" + frequency[key] + "</span></div>";
                }

                document.getElementById("lists").innerHTML = list;
                }
    }
  </script>
</html>
