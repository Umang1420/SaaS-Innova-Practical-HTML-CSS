<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Table</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="data">
            <div class="content">
                <div class="table">
                    <h1>Search Table Record:</h1><br>
                    <div class="se">
                        <input type="text" id="in" style="width: 100%; max-width: 700px; height: 30px;" placeholder="Item to filter">
                        <button id="srch">Search</button>
                    </div>
                    <table>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>ID</th>
                        </tr>
                        <tbody id="tablerow"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="script.js" defer></script>
</html>
