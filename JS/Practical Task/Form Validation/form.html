<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <link rel="stylesheet" href="form.css">
</head>
<body id="body">
    <div class="container">
        <header>
            <div class="content">
                <div class="for">
                    <div class="main">
                        
                            
                            <div class="status" >
                                <div id="stat">
                                    <p>No Validation Errors</p>
                                </div>
                            </div>
                            <form >
                            <h1 style="text-align: center;">Ragistration Form</h1>
                            <div class="info">
                                <label for="name">Username:</label><br>
                               <div class="infoo"> 
                                    <input type="text" class="in" id="inn" name="name">
                                    <p id="nv"></p>
                                </div>
                                <label for="email">Email:</label><br>
                                <div class="infoo">
                                    <input type="email" class="in" id="ine" name="email">
                                    <p id="ne"></p>
                                </div>
                                <label for="password">Password:</label><br>
                                <div class="infoo">
                                <input type="password" class="in" id="inp" name="password"><p id="np"></p>
                                </div>
                                <div id="message">
                                    <h3>Password must contain the following:</h3>
                                    <p id="letter" class="invalid">A <b>lowercase</b> letter <p id="l"></p></p>
                                    <p id="capital" class="invalid">A <b>capital (uppercase)</b> letter <p id="u"></p></p>
                                    <p id="number" class="invalid">A <b>number</b> <p id="n"></p></p>
                                    <p id="spch" class="invalid">A <b>Special characters</b> <p id="sp"></p></p>
                                    <p id="length" class="invalid">Minimum <b>8 characters</b> <p id="sl"></p></p>
                                </div>
                                <label for="conpassword">Confirm Password:</label><br>
                                <div class="infoo">
                                <input type="password" class="in" id="incp" name="conpassword"><p id="npc"></p>
                                </div>
                                <input type="checkbox" name="terms&condition" id="term" required><label for="terms">I accept the Terms & condition.</label><br><br>
                               <button type="submit" id="rbtn" onclick="alert('Form submitted Sucsessfully!')" disabled>Ragister</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </header>
    </div>
</body>
<script src="form.js" defer></script>
</html>
