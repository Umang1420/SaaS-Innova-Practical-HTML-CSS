<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        section{
            text-align: center;
            margin-top: 100px;
        }
        .hover-button {
            background-color: lightblue;
            border: none;
            color: white;
            padding: 15px 32px;
            display: inline-block;
            font-size: 16px;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        .hover-button:hover {
            background-color: rgb(160, 50, 50);
            transform: scale(1.3);
            color:blue;
        }
    </style>
</head>
<body>
    <section>
    <h1>A interactive Button with Hover Effect</h1>
    <a href="task1.html"><button class="hover-button">Hover over me!</button></a>
    </section>
</body>
</html>
