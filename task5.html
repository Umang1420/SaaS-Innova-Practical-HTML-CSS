<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <section class="marquee">
        <marquee scrollamount="15" direction="left">This text would have scrolled across the screen</marquee><br>
        <marquee  loop="5" direction="up">This text would have scrolled across the screen</marquee><br>
        <marquee  bgcolor="yellow" direction="right">This text would have scrolled across the screen</marquee><br>
        <marquee  direction="down">This text would have scrolled across the screen</marquee><br>
    </section>

    <section class="font" style="margin-top: 100px;">
      <font color="red" size="5" face="Arial">This is a red text with size 5 and Arial font</font><br>
    </section>
</body>
</html>
