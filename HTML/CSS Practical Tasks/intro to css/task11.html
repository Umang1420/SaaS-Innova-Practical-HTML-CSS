<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Aboreto">
</head>
<body>
    <section class="font-family">
        <h1>Font Family</h1>
        <p style="font-family: 'Times New Roman', serif; font-size: 1rem; color: red;">This text is in Times New Roman font.</p>
        <p style="font-family: 'Courier New', monospace; font-size: 2rem; color: green;">This text is in Courier New font.</p>
    </section>
    <section class="External font">
        <h1>External Font from google fonts</h1>
        <p style="font-family: 'Aboreto', cursive; font-size: 2rem; color: blue;">This text is in Aboreto font.</p>
    </section>
</body>
</html>
