<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linear Gradient</title>
</head>
<body>
    <section class="linear-gradient">
        <h1>Linear Gradient</h1>
        <div class="gradient-box" style="width: 200px; height: 200px; background: linear-gradient(to right, red, yellow); padding:20px;">
            This box has a linear gradient background.
        </div>
    </section>
    <div>
        <h1>Background Image</h1>
            <div class="background-img" style="width:200px; height: 200px; background-image: url('../assets/person.jpg'); background-size: cover; padding: 20px;">
                <p>This is a box with bg image</p>
            </div>
    </div>
</body>
</html>
